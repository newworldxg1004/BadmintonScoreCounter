<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Badminton Score</title>
<link rel="manifest" href="manifest.json">
<style>
body {
  margin: 0;
  font-family: sans-serif;
  display: flex;
  height: 100vh;
}

.player {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
  font-size: 40px;
}

.left { background: #eee; }
.right { background: #ddd; }

.serving {
  background: lightgreen !important;
}

.score {
  font-size: 100px;
}

button {
  position: fixed;
  top: 10px;
  left: 10px;
}
</style>
</head>

<body>

<div id="left" class="player left">
  <div>Team A</div>
  <div class="score" id="leftScore">0</div>
  <div id="leftServe"></div>
</div>

<div id="right" class="player right">
  <div>Team B</div>
  <div class="score" id="rightScore">0</div>
  <div id="rightServe"></div>
</div>

<button onclick="reset()">Reset</button>

<script>
let leftScore = 0;
let rightScore = 0;
let isLeftServing = true;

function update() {
  document.getElementById("leftScore").innerText = leftScore;
  document.getElementById("rightScore").innerText = rightScore;

  document.getElementById("left").classList.toggle("serving", isLeftServing);
  document.getElementById("right").classList.toggle("serving", !isLeftServing);

  document.getElementById("leftServe").innerText =
    isLeftServing ? serveText(leftScore) : "";

  document.getElementById("rightServe").innerText =
    !isLeftServing ? serveText(rightScore) : "";
}

function serveText(score) {
  return score % 2 === 0 ? "Serve: Right" : "Serve: Left";
}

document.getElementById("left").onclick = () => {
  leftScore++;
  isLeftServing = true;
  update();
};

document.getElementById("right").onclick = () => {
  rightScore++;
  isLeftServing = false;
  update();
};

function reset() {
  leftScore = 0;
  rightScore = 0;
  isLeftServing = true;
  update();
}

update();
</script>

</body>
</html>
